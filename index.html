<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ยาของฉัน — ตัวช่วยเตือนกินยา</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1e2530;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --warn: #f78166;
    --amber: #e3b341;
    --text: #e6edf3;
    --muted: #8b949e;
    --pill-morning: #1a3a5c;
    --pill-noon: #3a2a1a;
    --pill-evening: #2a1a3a;
    --pill-night: #1a2a2a;
    --streak: #f78166;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 80px 0;
  }

  .header {
    background: linear-gradient(135deg, #0d1117 0%, #1a1f2e 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .app-title {
    font-family: 'Kanit', sans-serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .app-title .icon { font-size: 26px; }

  .date-display {
    font-size: 13px;
    color: var(--muted);
    text-align: right;
    line-height: 1.5;
  }

  .progress-bar-wrap {
    background: var(--surface2);
    border-radius: 99px;
    height: 8px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width 0.5s ease;
  }

  .progress-label {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    text-align: right;
  }

  /* STREAK */
  .streak-banner {
    margin: 14px 20px 0;
    background: linear-gradient(135deg, rgba(247,129,102,0.12), rgba(227,179,65,0.08));
    border: 1px solid rgba(247,129,102,0.35);
    border-radius: 16px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .streak-fire {
    font-size: 34px;
    line-height: 1;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }

  .streak-info { flex: 1; }

  .streak-num {
    font-family: 'Kanit', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--streak);
    line-height: 1;
  }

  .streak-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .streak-dots { display: flex; gap: 5px; align-items: center; }

  .streak-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.3s;
  }

  .streak-dot.active { background: var(--streak); }
  .streak-dot.today  { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }

  /* SUMMARY */
  .summary-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 14px 20px 0;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }

  .stat-num {
    font-family: 'Kanit', sans-serif;
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
  }

  .stat-num.done    { color: var(--accent2); }
  .stat-num.pending { color: var(--amber); }
  .stat-num.missed  { color: var(--warn); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* NOTIFICATION BAR */
  .notif-bar {
    margin: 14px 20px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--muted);
  }

  .notif-icon { font-size: 18px; }
  .notif-text { flex: 1; }

  .btn-notif {
    background: var(--accent);
    color: #0d1117;
    border: none;
    border-radius: 8px;
    padding: 6px 14px;
    font-family: 'Kanit', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }

  .btn-notif.granted { background: var(--surface2); color: var(--accent2); border: 1px solid var(--accent2); }
  .btn-notif.denied  { background: var(--surface2); color: var(--warn); border: 1px solid var(--warn); cursor: default; }

  /* SECTION */
  .section { margin: 20px 20px 0; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .section-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .morning .section-icon { background: var(--pill-morning); }
  .noon    .section-icon { background: var(--pill-noon); }
  .evening .section-icon { background: var(--pill-evening); }
  .night   .section-icon { background: var(--pill-night); }

  .section-title { font-family: 'Kanit', sans-serif; font-size: 15px; font-weight: 500; }
  .section-time  { font-size: 12px; color: var(--muted); }

  .section-badge {
    margin-left: auto;
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 2px 10px;
    color: var(--muted);
  }

  /* MED CARD */
  .med-list { display: flex; flex-direction: column; gap: 8px; }

  .med-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .med-card:active { transform: scale(0.98); }
  .med-card.checked { opacity: 0.55; border-color: transparent; }
  .med-card.checked::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent2);
    opacity: 0.04;
    pointer-events: none;
  }
  .med-card.low-stock { border-color: rgba(247,129,102,0.4); }

  .check-circle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.25s;
    font-size: 14px;
  }

  .med-card.checked .check-circle { background: var(--accent2); border-color: var(--accent2); }

  .med-info { flex: 1; min-width: 0; }

  .med-name {
    font-family: 'Kanit', sans-serif;
    font-size: 15px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .med-card.checked .med-name { text-decoration: line-through; color: var(--muted); }
  .med-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* PILL STOCK */
  .pill-stock {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    flex-shrink: 0;
  }

  .pill-count {
    font-family: 'Kanit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    background: var(--surface2);
    border-radius: 8px;
    padding: 3px 9px;
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  .pill-count.low { color: var(--warn); border-color: rgba(247,129,102,0.4); }

  .stock-controls { display: flex; gap: 2px; margin-top: 2px; }

  .stock-btn {
    width: 22px;
    height: 22px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: all 0.15s;
    line-height: 1;
  }

  .stock-btn:hover { background: var(--border); color: var(--text); }

  .med-pill-badge {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    background: var(--surface2);
    border-radius: 8px;
    padding: 4px 10px;
    white-space: nowrap;
    border: 1px solid var(--border);
  }

  .med-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

  /* ADD BUTTON */
  .add-btn {
    margin: 20px 20px 0;
    width: calc(100% - 40px);
    padding: 14px;
    background: transparent;
    border: 1.5px dashed var(--border);
    border-radius: 14px;
    color: var(--muted);
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .add-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,0.04); }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-width: 480px;
    border-top: 1px solid var(--border);
    transform: translateY(100%);
    transition: transform 0.3s ease;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-title {
    font-family: 'Kanit', sans-serif;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 13px; color: var(--muted); margin-bottom: 6px; display: block; }

  .form-input, .form-select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-select option { background: var(--surface2); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-row  { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }

  .btn {
    padding: 14px;
    border-radius: 12px;
    font-family: 'Kanit', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }

  .btn-cancel { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .btn-save   { background: var(--accent); color: #0d1117; }
  .btn-save:hover { background: #79c0ff; }

  .reset-wrap { padding: 20px 20px 0; display: flex; justify-content: center; }

  .btn-reset {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    padding: 8px 20px;
    border-radius: 99px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }

  .btn-reset:hover { border-color: var(--warn); color: var(--warn); }

  /* TOAST */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--accent2);
    color: #0d1117;
    font-family: 'Kanit', sans-serif;
    font-weight: 500;
    font-size: 14px;
    padding: 12px 24px;
    border-radius: 99px;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(63,185,80,0.3);
  }

  .toast.show  { transform: translateX(-50%) translateY(0); }
  .toast.warn  { background: var(--warn);  box-shadow: 0 4px 20px rgba(247,129,102,0.3); }
  .toast.amber { background: var(--amber); box-shadow: 0 4px 20px rgba(227,179,65,0.3); color: #0d1117; }

  /* BANNERS */
  .missed-banner {
    margin: 14px 20px 0;
    background: rgba(247,129,102,0.08);
    border: 1px solid rgba(247,129,102,0.3);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--warn);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .low-stock-banner {
    margin: 14px 20px 0;
    background: rgba(247,129,102,0.06);
    border: 1px solid rgba(247,129,102,0.25);
    border-radius: 12px;
    padding: 12px 16px;
  }

  .low-stock-title { font-size: 13px; font-weight: 600; color: var(--warn); margin-bottom: 4px; }
  .low-stock-items { font-size: 12px; color: var(--muted); }

  .empty-state { text-align: center; padding: 30px 20px; color: var(--muted); font-size: 14px; }
  .empty-state .emoji { font-size: 36px; margin-bottom: 10px; }

  @media (max-width: 380px) {
    .summary-row { gap: 6px; }
    .stat-num { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- Header -->
<div class="header">
  <div class="header-top">
    <div class="app-title"><span class="icon">💊</span>ยาของฉัน</div>
    <div class="date-display" id="dateDisplay"></div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
  </div>
  <div class="progress-label" id="progressLabel">กินยาแล้ว 0 จาก 0 รายการ</div>
</div>

<!-- 🔥 Streak -->
<div class="streak-banner">
  <div class="streak-fire">🔥</div>
  <div class="streak-info">
    <div class="streak-num" id="streakNum">0</div>
    <div class="streak-label">วันติดต่อกันที่กินยาครบ</div>
  </div>
  <div class="streak-dots" id="streakDots"></div>
</div>

<!-- Summary -->
<div class="summary-row">
  <div class="stat-card">
    <div class="stat-num done"    id="statDone">0</div>
    <div class="stat-label">✅ กินแล้ว</div>
  </div>
  <div class="stat-card">
    <div class="stat-num pending" id="statPending">0</div>
    <div class="stat-label">⏳ รอกิน</div>
  </div>
  <div class="stat-card">
    <div class="stat-num missed"  id="statMissed">0</div>
    <div class="stat-label">⚠️ พลาด</div>
  </div>
</div>

<!-- 🔔 Notification bar -->
<div class="notif-bar" id="notifBar">
  <span class="notif-icon">🔔</span>
  <span class="notif-text" id="notifText">เปิดการแจ้งเตือนเพื่อไม่พลาดการกินยา</span>
  <button class="btn-notif" id="notifBtn" onclick="requestNotifPermission()">เปิดใช้</button>
</div>

<!-- Low stock -->
<div id="lowStockWrap"></div>

<!-- Missed -->
<div class="missed-banner" id="missedBanner" style="display:none">
  ⚠️ <span id="missedText"></span>
</div>

<!-- Sections -->
<div id="sectionsContainer"></div>

<!-- Add -->
<button class="add-btn" onclick="openModal()">➕ เพิ่มยาใหม่</button>

<!-- Reset -->
<div class="reset-wrap">
  <button class="btn-reset" onclick="resetDay()">🔄 รีเซ็ตเริ่มวันใหม่</button>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title">➕ เพิ่มยาใหม่</div>

    <div class="form-group">
      <label class="form-label">ชื่อยา *</label>
      <input class="form-input" id="medName" placeholder="เช่น Metformin, วิตามิน C" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">จำนวน/ครั้ง</label>
        <input class="form-input" id="medDose" placeholder="เช่น 1 เม็ด" />
      </div>
      <div class="form-group">
        <label class="form-label">วิธีกิน</label>
        <input class="form-input" id="medNote" placeholder="เช่น หลังอาหาร" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">ช่วงเวลา *</label>
        <select class="form-select" id="medTime">
          <option value="morning">🌅 เช้า</option>
          <option value="noon">☀️ กลางวัน</option>
          <option value="evening">🌆 เย็น</option>
          <option value="night">🌙 ก่อนนอน</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">จำนวนยาที่มี (เม็ด)</label>
        <input class="form-input" id="medStock" type="number" min="0" placeholder="เช่น 30" />
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-save"   onclick="saveMed()">บันทึก</button>
    </div>
  </div>
</div>

<script>
const TIMES = [
  { key: 'morning', label: 'เช้า',     icon: '🌅', time: '07:00', cls: 'morning' },
  { key: 'noon',    label: 'กลางวัน', icon: '☀️', time: '12:00', cls: 'noon'    },
  { key: 'evening', label: 'เย็น',     icon: '🌆', time: '18:00', cls: 'evening' },
  { key: 'night',   label: 'ก่อนนอน', icon: '🌙', time: '21:00', cls: 'night'   },
];
const LOW_STOCK_THRESHOLD = 7;

// ── State ──
let meds    = JSON.parse(localStorage.getItem('meds')       || '[]');
let checked = JSON.parse(localStorage.getItem('checked')    || '{}');
let history = JSON.parse(localStorage.getItem('medHistory') || '[]');
let lastReset = localStorage.getItem('lastReset') || '';

const todayStr = new Date().toDateString();

// Auto-reset on new day & save history
if (lastReset !== todayStr) {
  if (lastReset && meds.length > 0) {
    const done     = Object.keys(checked).length;
    const complete = done >= meds.length;
    history.push({ date: lastReset, complete });
    if (history.length > 30) history = history.slice(-30);
    localStorage.setItem('medHistory', JSON.stringify(history));
  }
  checked = {};
  localStorage.setItem('checked', '{}');
  localStorage.setItem('lastReset', todayStr);
}

// Demo data
if (meds.length === 0) {
  meds = [
    { id: 1, name: 'Metformin 500mg', dose: '1 เม็ด',   note: 'หลังอาหาร',          time: 'morning', stock: 5  },
    { id: 2, name: 'วิตามิน C',        dose: '1 เม็ด',   note: 'หลังอาหาร',          time: 'morning', stock: 30 },
    { id: 3, name: 'Amlodipine 5mg',  dose: '1 เม็ด',   note: 'ก่อนอาหาร',          time: 'noon',    stock: 14 },
    { id: 4, name: 'Omeprazole',      dose: '1 แคปซูล', note: 'ก่อนอาหาร 30 นาที', time: 'evening', stock: 3  },
    { id: 5, name: 'Melatonin 3mg',   dose: '1 เม็ด',   note: 'ก่อนนอน 30 นาที',   time: 'night',   stock: 20 },
  ];
  saveMeds();
}

function saveMeds()    { localStorage.setItem('meds',    JSON.stringify(meds)); }
function saveChecked() { localStorage.setItem('checked', JSON.stringify(checked)); }

// ── Streak ──
function calcStreak() {
  const total         = meds.length;
  const todayDone     = meds.filter(m => checked[m.id]).length;
  const todayComplete = total > 0 && todayDone >= total;
  const days          = [...history, { date: todayStr, complete: todayComplete }];
  let streak = 0;
  for (let i = days.length - 1; i >= 0; i--) {
    if (days[i].complete) streak++;
    else break;
  }
  return { streak, days: days.slice(-7) };
}

// ── Missed slots ──
function getMissedTimes() {
  const now    = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();
  return TIMES.reduce((acc, t) => {
    const [h, m] = t.time.split(':').map(Number);
    if (nowMin > h * 60 + m + 60) {
      const unchecked = meds.filter(med => med.time === t.key && !checked[med.id]);
      if (unchecked.length) acc.push({ ...t, count: unchecked.length });
    }
    return acc;
  }, []);
}

// ── Notifications ──
function updateNotifUI() {
  const bar = document.getElementById('notifBar');
  const btn = document.getElementById('notifBtn');
  const txt = document.getElementById('notifText');
  if (!('Notification' in window)) { bar.style.display = 'none'; return; }
  if (Notification.permission === 'granted') {
    txt.textContent = 'เปิดการแจ้งเตือนแล้ว ✓';
    btn.textContent = 'เปิดอยู่';
    btn.className   = 'btn-notif granted';
  } else if (Notification.permission === 'denied') {
    txt.textContent = 'การแจ้งเตือนถูกบล็อก — เปิดในการตั้งค่าเบราว์เซอร์';
    btn.textContent = 'ถูกบล็อก';
    btn.className   = 'btn-notif denied';
  } else {
    txt.textContent = 'เปิดการแจ้งเตือนเพื่อไม่พลาดการกินยา';
    btn.textContent = 'เปิดใช้';
    btn.className   = 'btn-notif';
  }
}

function requestNotifPermission() {
  if (!('Notification' in window)) return;
  Notification.requestPermission().then(perm => {
    updateNotifUI();
    if (perm === 'granted') {
      showToast('🔔 เปิดการแจ้งเตือนแล้ว!');
      scheduleNotifications();
    }
  });
}

function sendNotif(title, body) {
  if (Notification.permission === 'granted') new Notification(title, { body, icon: '💊' });
}

let notifTimers = [];
function scheduleNotifications() {
  notifTimers.forEach(clearTimeout);
  notifTimers = [];
  if (Notification.permission !== 'granted') return;
  const now = new Date();
  for (const t of TIMES) {
    const [h, m] = t.time.split(':').map(Number);
    const target = new Date(); target.setHours(h, m, 0, 0);
    const diff = target - now;
    if (diff > 0) {
      notifTimers.push(setTimeout(() => {
        const pending = meds.filter(med => med.time === t.key && !checked[med.id]);
        if (pending.length > 0)
          sendNotif(`💊 ถึงเวลากินยา${t.label}แล้ว!`,
            `${pending.length} รายการ: ${pending.map(p => p.name).join(', ')}`);
      }, diff));
    }
  }
}

// ── Stock ──
function adjustStock(e, id, delta) {
  e.stopPropagation();
  const med = meds.find(m => m.id === id);
  if (!med) return;
  if (med.stock == null) med.stock = 0;
  med.stock = Math.max(0, med.stock + delta);
  saveMeds();
  render();
}

// ── Render ──
function render() {
  const now    = new Date();
  const days   = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'];
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  document.getElementById('dateDisplay').innerHTML =
    `วัน${days[now.getDay()]}ที่ ${now.getDate()} ${months[now.getMonth()]}<br>${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')} น.`;

  const total   = meds.length;
  const done    = meds.filter(m => checked[m.id]).length;
  const missed  = getMissedTimes().reduce((a, t) => a + t.count, 0);
  const pending = Math.max(0, total - done - missed);

  document.getElementById('statDone').textContent    = done;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statMissed').textContent  = missed;

  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressBar').style.width     = pct + '%';
  document.getElementById('progressLabel').textContent   = `กินยาแล้ว ${done} จาก ${total} รายการ (${pct}%)`;

  // Streak
  const { streak, days: recentDays } = calcStreak();
  document.getElementById('streakNum').textContent = streak;
  document.getElementById('streakDots').innerHTML  = recentDays.map(d => {
    const cls = d.date === todayStr ? 'streak-dot today' : (d.complete ? 'streak-dot active' : 'streak-dot');
    return `<div class="${cls}" title="${d.date}"></div>`;
  }).join('');

  // Notification UI
  updateNotifUI();

  // Low stock
  const lowMeds = meds.filter(m => m.stock != null && m.stock <= LOW_STOCK_THRESHOLD);
  const lsWrap  = document.getElementById('lowStockWrap');
  if (lowMeds.length) {
    lsWrap.innerHTML = `<div class="low-stock-banner">
      <div class="low-stock-title">💊 ยาใกล้หมด!</div>
      <div class="low-stock-items">${lowMeds.map(m => `${m.name} เหลือ ${m.stock} เม็ด`).join(' · ')}</div>
    </div>`;
  } else { lsWrap.innerHTML = ''; }

  // Missed
  const missedTimes = getMissedTimes();
  if (missedTimes.length) {
    document.getElementById('missedBanner').style.display = 'flex';
    document.getElementById('missedText').textContent =
      'มียาที่ยังไม่ได้กิน: ' + missedTimes.map(t => `${t.label} ${t.count} รายการ`).join(', ');
  } else { document.getElementById('missedBanner').style.display = 'none'; }

  // Sections
  const container = document.getElementById('sectionsContainer');
  container.innerHTML = '';

  for (const t of TIMES) {
    const timeMeds  = meds.filter(m => m.time === t.key);
    const doneCount = timeMeds.filter(m => checked[m.id]).length;

    const section = document.createElement('div');
    section.className = `section ${t.cls}`;

    const header = `<div class="section-header">
      <div class="section-icon">${t.icon}</div>
      <div>
        <div class="section-title">${t.label}</div>
        <div class="section-time">${t.time} น.</div>
      </div>
      <div class="section-badge">${doneCount}/${timeMeds.length}</div>
    </div>`;

    let cards = '';
    if (timeMeds.length === 0) {
      cards = `<div class="empty-state"><div class="emoji">🫙</div>ยังไม่มียาในช่วงนี้</div>`;
    } else {
      cards = `<div class="med-list">` + timeMeds.map(med => {
        const hasStock = med.stock != null;
        const isLow    = hasStock && med.stock <= LOW_STOCK_THRESHOLD;
        const stockHTML = hasStock
          ? `<div class="pill-stock" onclick="event.stopPropagation()">
               <div class="pill-count ${isLow ? 'low' : ''}">${med.stock} เม็ด</div>
               <div class="stock-controls">
                 <button class="stock-btn" onclick="adjustStock(event,${med.id},-1)">−</button>
                 <button class="stock-btn" onclick="adjustStock(event,${med.id},+1)">+</button>
               </div>
             </div>`
          : `<div class="med-pill-badge">${med.dose || ''}</div>`;

        return `<div class="med-card ${checked[med.id] ? 'checked' : ''} ${isLow && !checked[med.id] ? 'low-stock' : ''}" onclick="toggleMed(${med.id})">
          <div class="check-circle">${checked[med.id] ? '✓' : ''}</div>
          <div class="med-info">
            <div class="med-name">${med.name}</div>
            <div class="med-detail">${med.dose ? med.dose + ' · ' : ''}${med.note || ''}</div>
          </div>
          <div class="med-actions">
            ${stockHTML}
            <button onclick="deleteMed(event,${med.id})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px">🗑</button>
          </div>
        </div>`;
      }).join('') + `</div>`;
    }

    section.innerHTML = header + cards;
    container.appendChild(section);
  }
}

function toggleMed(id) {
  if (checked[id]) {
    delete checked[id];
  } else {
    checked[id] = true;
    // Deduct stock (ไม่ให้ติดลบ)
    const med = meds.find(m => m.id === id);
    if (med && med.stock != null) {
      if (med.stock <= 0) {
        showToast('⚠️ ยาหมดแล้ว! กรุณาเติมยา', 'warn');
        delete checked[id];
        saveChecked();
        render();
        return;
      }
      med.stock--;
      saveMeds();
    }
    showToast('✅ บันทึกแล้ว!');
    // All done today?
    if (meds.length > 0 && meds.filter(m => checked[m.id]).length >= meds.length) {
      setTimeout(() => showToast('🔥 กินยาครบวันนี้แล้ว! Streak ต่อเนื่อง!', 'amber'), 900);
      sendNotif('🎉 กินยาครบแล้ว!', 'ขอบคุณที่ดูแลสุขภาพวันนี้ 💪');
    }
  }
  saveChecked();
  render();
}

function deleteMed(e, id) {
  e.stopPropagation();
  if (!confirm('ต้องการลบยานี้ออก?')) return;
  meds = meds.filter(m => m.id !== id);
  delete checked[id];
  saveMeds(); saveChecked(); render();
  showToast('🗑 ลบยาแล้ว', 'warn');
}

function resetDay() {
  if (!confirm('รีเซ็ตสถานะการกินยาทั้งหมด?')) return;
  // บันทึก history ของวันนี้ก่อน reset
  if (meds.length > 0) {
    const done     = meds.filter(m => checked[m.id]).length;
    const complete = done >= meds.length;
    // อัปเดต history วันนี้ (ถ้ามีอยู่แล้วให้แทนที่)
    const idx = history.findIndex(h => h.date === todayStr);
    if (idx >= 0) history[idx].complete = complete;
    else history.push({ date: todayStr, complete });
    if (history.length > 30) history = history.slice(-30);
    localStorage.setItem('medHistory', JSON.stringify(history));
  }
  checked = {};
  saveChecked();
  render();
  showToast('🔄 เริ่มวันใหม่แล้ว!');
}

let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = 'toast', 2800);
}

function openModal() {
  ['medName','medDose','medNote','medStock'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('medTime').value = 'morning';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('medName').focus(), 300);
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

function saveMed() {
  const name = document.getElementById('medName').value.trim();
  if (!name) { showToast('⚠️ กรุณาใส่ชื่อยา', 'warn'); return; }
  const stockRaw = document.getElementById('medStock').value;
  meds.push({
    id:    Date.now(),
    name,
    dose:  document.getElementById('medDose').value.trim()  || '1 เม็ด',
    note:  document.getElementById('medNote').value.trim(),
    time:  document.getElementById('medTime').value,
    stock: stockRaw !== '' ? parseInt(stockRaw) : null,
  });
  saveMeds(); closeModal(); render();
  showToast('💊 เพิ่มยาแล้ว!');
}

// Init
render();
scheduleNotifications();
setInterval(render, 60000);
// Reschedule at midnight
setTimeout(() => {
  scheduleNotifications();
  setInterval(scheduleNotifications, 86400000);
}, new Date().setHours(24,0,0,0) - Date.now());
</script>
